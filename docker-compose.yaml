---
# Dev environment for local HIPPO development.
# Needs two containers, backend with HIPPO and dependencies installed, and database

# database container is built from images/postgres/Dockerfile:
# sudo docker build --no-cache  -t hippo-pg:latest .

# Backend from ./Dockerfile
# sudo docker build --no-cache . -t hippo-backend:latest

# Then bring the containers up with:
# sudo docker-compose up

# To clear the system run
# sudo docker compose down

# To also clear the datbase volume
# sudo docker compose down -v


services:

  database:
    # this is what I built for myself
    image: hippo-pg
    image: pgvectorimage
    # container_name: hippo_pg_db
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - type: bind
      source: ./pg_setup/docker-entrypoint-initdb.d
      target: /docker-entrypoint-initdb.d
    
    environment:
      POSTGRES_PASSWORD: hippo
      POSTGRES_DB: hippo
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
    - "5432:5432"
    # healthcheck:
    #   test: pg_isready -U postgres -d frag
    #   interval: 10s
    #   timeout: 2s
    #   retries: 5
    #   start_period: 10s

  backend:
    image: hippo-backend
    container_name: hippo_backend
    build:
      context: .
      dockerfile: Dockerfile
    # command: /bin/bash /code/launch-stack.sh
    volumes:
    - .:/code/
    env_file:
      - .env
    environment:
      POSTGRESQL_USER: postgres

    ports:
    - "8888:8888"
    # depends_on:
    #   database:
    #     condition: service_healthy


volumes:
  postgres_data: